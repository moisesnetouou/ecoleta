version: '3.8'

services:
  database_ecoleta:
    image: postgres
    container_name: database_ecoleta
    restart: always
    ports:
      - 1605:5432
    environment:
      - POSTGRES_USER=
      - POSTGRES_PASSWORD=
      - POSTGRES_DB=
    volumes:
      - pgdata:/data/postgres/ecoleta

volumes:
  pgdata:
    driver: local
